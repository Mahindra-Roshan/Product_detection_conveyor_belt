services:
  - type: web
    name: product-detection-conveyor-belt
    runtime: python
    plan: free
    rootDir: Conveyor_belt
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
